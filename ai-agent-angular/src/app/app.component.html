<!-- Chat Interface Section -->
<main style="padding: 2rem; max-width: 600px; margin: 0 auto;">
  <div style="background: #f5f5f5; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
    <h1 style="margin-top: 0; color: #333;">AI Agent Chat</h1>
    <p style="color: #666; margin-bottom: 1.5rem;">Send a message to the API</p>

    <!-- Error Message -->
    @if (errorMessage) {
      <div style="background: #fee; border: 1px solid #fcc; color: #c33; padding: 1rem; border-radius: 4px; margin-bottom: 1rem;">
        {{ errorMessage }}
      </div>
    }

    <!-- Input and Button -->
    <div style="margin-bottom: 1.5rem;">
      <textarea
        [(ngModel)]="message"
        placeholder="Enter your message here..."
        style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-family: Arial, sans-serif; font-size: 1rem; min-height: 80px; box-sizing: border-box;"
      ></textarea>
    </div>

    <button
      (click)="sendMessage()"
      [disabled]="isLoading || !message.trim()"
      style="
        width: 100%;
        padding: 0.75rem 1.5rem;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 1rem;
        cursor: {{ isLoading || !message.trim() ? 'not-allowed' : 'pointer' }};
        opacity: {{ isLoading || !message.trim() ? '0.6' : '1' }};
        transition: background 0.3s;
      "
    >
      {{ isLoading ? 'Sending...' : 'Send Message' }}
    </button>

    <!-- Response Section -->
    @if (response) {
      <div style="margin-top: 2rem; padding: 1rem; background: #e8f5e9; border: 1px solid #4caf50; border-radius: 4px;">
        <h3 style="margin-top: 0; color: #2e7d32;">Response:</h3>
        <p style="margin: 0; color: #333; word-wrap: break-word;">{{ response }}</p>
      </div>
    }
  </div>
</main>

<router-outlet />
